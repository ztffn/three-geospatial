# Self-hosted "Humatopia World Twin" deployment (twin.humatopia.ai).
# Single container on the mediaserver host; image pulled from GHCR; ingress via
# Cloudflare Tunnel (cloudflared on host) routing twin.humatopia.ai -> :13002.
# Runtime secrets: only the OPTIONAL BarentsWatch AIS client credentials (live
# shadow-fleet marker layer), read from the host .env beside this file. Absent →
# the AIS proxy 503s and the globe shows no vessel markers (never fabricated).
# The MET proxy needs only a User-Agent; browser tokens are baked into the SPA
# at build time (provider-restricted). See DEPLOY-TWIN.md.

services:
  twin:
    image: ${TWIN_IMAGE:-ghcr.io/huma-energy/humatopia-twin:latest}
    container_name: huma-twin
    restart: unless-stopped
    # 13000 = prod frontend, 13001 = dev frontend (humatopia-frontend), 13002 = twin.
    # Cloudflare Tunnel routes twin.humatopia.ai -> 127.0.0.1:13002.
    ports:
      - "127.0.0.1:13002:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Optional BarentsWatch AIS credentials — substituted from the host .env
      # beside this compose file (never committed). Empty default keeps the
      # container healthy without them (markers simply stay empty).
      BARENTSWATCH_CLIENT_ID: ${BARENTSWATCH_CLIENT_ID:-}
      BARENTSWATCH_CLIENT_SECRET: ${BARENTSWATCH_CLIENT_SECRET:-}
    healthcheck:
      # Node-based (no wget/curl in the slim runtime image); global fetch on Node 22.
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
