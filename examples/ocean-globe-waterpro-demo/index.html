<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Globe WaterPro Ocean</title>
    <style>
      /* Huma brand font for the top-left wordmark (see main.tsx BrandMark).
         Served at /public/brand/* — sirv in dev, copied at build. */
      @font-face {
        font-family: 'HumaDisplay';
        src: url('/public/brand/HumaDisplay-Light.otf') format('opentype');
        font-weight: 300;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'HumaDisplay';
        src: url('/public/brand/HumaDisplay-Regular.otf') format('opentype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      html,
      body,
      #root {
        margin: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: #101820;
      }
      #unsupported {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        color: #cfd8e3;
        font: 14px/1.5 system-ui, sans-serif;
        text-align: center;
        padding: 24px;
      }
      #unsupported.show {
        display: flex;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="unsupported">
      This demo requires WebGPU. Open in Chrome/Edge (desktop) or Safari Technology Preview.
    </div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
